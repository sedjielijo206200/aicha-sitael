<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aïcha — SITAEL</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #f0ede8; height: 100vh; display: flex; flex-direction: column; }
  .header { background: #1a0a00; border-bottom: 1px solid rgba(196,140,60,0.3); padding: 14px 20px; display: flex; align-items: center; gap: 14px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #c48c3c, #e8b86d); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; color: #1a0a00; }
  .header-info h1 { font-size: 17px; color: #e8b86d; }
  .header-info p { font-size: 11px; color: rgba(196,140,60,0.7); text-transform: uppercase; letter-spacing: 0.05em; }
  .online { margin-left: auto; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: #4ade80; font-size: 11px; padding: 4px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; flex-shrink: 0; }
  .msg-avatar.ai { background: linear-gradient(135deg, #c48c3c, #e8b86d); color: #1a0a00; }
  .msg-avatar.hu { background: rgba(255,255,255,0.1); color: #f0ede8; border: 1px solid rgba(255,255,255,0.15); font-size: 10px; }
  .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
  .bubble.ai { background: #1e1206; border: 1px solid rgba(196,140,60,0.2); border-top-left-radius: 4px; }
  .bubble.user { background: #c48c3c; color: #1a0a00; border-top-right-radius: 4px; font-weight: 500; }
  .tag { font-size: 10px; color: rgba(196,140,60,0.5); margin-bottom: 4px; }
  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; background: #1e1206; border: 1px solid rgba(196,140,60,0.2); border-radius: 18px; border-top-left-radius: 4px; width: fit-content; }
  .typing span { width: 7px; height: 7px; background: #c48c3c; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-5px);opacity:1} }
  .quick { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px 12px; }
  .qbtn { background: transparent; border: 1px solid rgba(196,140,60,0.35); color: #c48c3c; padding: 7px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: inherit; }
  .qbtn:hover { background: rgba(196,140,60,0.12); }
  .input-area { padding: 14px 20px; border-top: 1px solid rgba(196,140,60,0.15); display: flex; gap: 10px; align-items: flex-end; background: #0f0700; }
  textarea { flex: 1; background: #1e1206; border: 1px solid rgba(196,140,60,0.25); border-radius: 22px; padding: 10px 18px; color: #f0ede8; font-family: inherit; font-size: 14px; outline: none; resize: none; min-height: 44px; max-height: 100px; line-height: 1.5; transition: border-color 0.2s; }
  textarea:focus { border-color: rgba(196,140,60,0.6); }
  textarea::placeholder { color: rgba(196,140,60,0.35); }
  button.send { width: 44px; height: 44px; background: linear-gradient(135deg, #c48c3c, #e8b86d); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; flex-shrink: 0; }
  button.send:hover { transform: scale(1.05); }
  button.send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: rgba(196,140,60,0.2); border-radius: 2px; }
</style>
</head>
<body>
<div class="header">
  <div class="avatar">A</div>
  <div class="header-info">
    <h1>Aïcha</h1>
    <p>Assistante commerciale · SITAEL</p>
  </div>
  <div class="online"><div class="dot"></div> En ligne 24h/24</div>
</div>

<div class="chat" id="chat">
  <div class="msg">
    <div class="msg-avatar ai">A</div>
    <div>
      <div class="tag">Aïcha · SITAEL</div>
      <div class="bubble ai">Bonjour et bienvenue chez <strong>SITAEL</strong> ! 🌟<br><br>Je suis Aïcha, votre assistante commerciale. Je suis là pour vous aider — carrelage, sanitaires, robinetterie, meubles de salle de bain...<br><br>Comment puis-je vous aider aujourd'hui ?</div>
    </div>
  </div>
</div>

<div class="quick" id="quick">
  <button class="qbtn" onclick="send('Quels sont vos produits ?')">Vos produits</button>
  <button class="qbtn" onclick="send('Où est votre showroom ?')">📍 Showroom</button>
  <button class="qbtn" onclick="send('Quels sont vos horaires ?')">🕘 Horaires</button>
  <button class="qbtn" onclick="send('Comment vous contacter ?')">📞 Contact</button>
</div>

<div class="input-area">
  <textarea id="inp" placeholder="Écrivez votre message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
  <button class="send" id="sendbtn" onclick="send()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a0a00"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const sessionId = 'demo-' + Date.now();
let busy = false;

async function send(text) {
  const inp = document.getElementById('inp');
  const msg = text || inp.value.trim();
  if (!msg || busy) return;
  busy = true;
  inp.value = '';
  inp.style.height = '44px';
  document.getElementById('sendbtn').disabled = true;
  document.getElementById('quick').style.display = 'none';
  addMsg(msg, 'user');
  showTyping();
  try {
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: msg, sessionId })
    });
    const data = await r.json();
    hideTyping();
    addMsg(data.reply, 'ai');
  } catch(e) {
    hideTyping();
    addMsg("Désolée, un problème est survenu. Réessayez !", 'ai');
  }
  busy = false;
  document.getElementById('sendbtn').disabled = false;
}

function addMsg(text, who) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg' + (who==='user' ? ' user' : '');
  const av = document.createElement('div');
  av.className = 'msg-avatar ' + (who==='ai' ? 'ai' : 'hu');
  av.textContent = who==='ai' ? 'A' : 'Vous';
  const wrap = document.createElement('div');
  if(who==='ai') { const t=document.createElement('div'); t.className='tag'; t.textContent='Aïcha · SITAEL'; wrap.appendChild(t); }
  const b = document.createElement('div');
  b.className = 'bubble ' + who;
  b.innerHTML = text.replace(/\n/g,'<br>');
  wrap.appendChild(b);
  d.appendChild(av); d.appendChild(wrap);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

let typingEl = null;
function showTyping() {
  const chat = document.getElementById('chat');
  typingEl = document.createElement('div');
  typingEl.className = 'msg';
  typingEl.innerHTML = '<div class="msg-avatar ai">A</div><div class="typing"><span></span><span></span><span></span></div>';
  chat.appendChild(typingEl);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping() { if(typingEl) { typingEl.remove(); typingEl=null; } }
</script>
</body>
</html>
